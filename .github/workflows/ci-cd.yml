name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
    strategy:
      matrix:
        python-version: [3.12]
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Check backend syntax
        run: python -m compileall backend

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Trigger Render backend deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.RENDER_BACKEND_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_BACKEND_DEPLOY_HOOK_URL"

      - name: Trigger Render frontend deploy
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.RENDER_FRONTEND_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_FRONTEND_DEPLOY_HOOK_URL"
